server {
    listen 80;
    server_name 185.177.116.213;

    # Frontend - Servir archivos estáticos de React
    location / {
        root /home/vps/crumifront/dist;
        try_files $uri $uri/ /index.html;
        
        # Headers para caché
        add_header Cache-Control "public, max-age=3600";
    }

    # Backend API - Proxy reverso
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Archivos estáticos con caché más largo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /home/vps/crumifront/dist;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/crumi_access.log;
    error_log /var/log/nginx/crumi_error.log;
}
