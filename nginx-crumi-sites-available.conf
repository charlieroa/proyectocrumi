# Frontend server - HTTP (will be upgraded to HTTPS by certbot)
server {
    server_name crumi.ai www.crumi.ai;

    root /var/www/frontend/build;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Rutas SPA (React Router): /tasks/kanban y /empresas - fallback a index.html al recargar o abrir enlace directo
    location /tasks/ {
        try_files $uri $uri/ /index.html;
    }
    location /empresas {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/crumi_access.log;
    error_log /var/log/nginx/crumi_error.log;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/crumi.ai/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/crumi.ai/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}

# Backend API server - HTTP (will be upgraded to HTTPS by certbot)
server {
    server_name api.crumi.ai;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/api_crumi_access.log;
    error_log /var/log/nginx/api_crumi_error.log;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/api.crumi.ai/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/api.crumi.ai/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = www.crumi.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = crumi.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name crumi.ai www.crumi.ai;
    return 404; # managed by Certbot




}
server {
    if ($host = api.crumi.ai) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name api.crumi.ai;
    return 404; # managed by Certbot


}
